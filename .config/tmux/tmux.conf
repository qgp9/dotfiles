########################################
# tmux.conf — Inner layer
#
# The inner tmux where actual work happens in the 2-layer setup.
# Runs inside the base (outer) tmux with prefix C-a.
# Shared settings are loaded from common.conf.
#
# Load order: common.conf → tmux.conf → TPM (plugins)
# TPM initialization is placed last to prevent
# sensible from overwriting common.conf values.
########################################

# Load shared settings (mouse, vi copy-mode, pane/window navigation, shared status bar, etc.)
source-file ~/.config/tmux/common.conf


########################################
# PREFIX (inner: C-a)
########################################

# Unbind default prefix (C-b) and set C-a
# Same key binding as screen. Distinct from base's C-q.
unbind C-b
set -g prefix C-a

# prefix + a: Send prefix to nested tmux (for tmux inside inner)
bind  a send-prefix

# C-a C-a: Quick switch to last window
bind-key C-a last-window


########################################
# Inner-specific Bindings
########################################

# Alt+Enter: Select bottom-right pane and split horizontally at current path
# Used with tilish for quickly adding terminals
bind-key -n M-Enter 'select-pane -t "bottom-right"; split-pane -c "#{pane_current_path}"'

# Shift+F10: Used as vscode-compatible key binding in lazyvim
# Commented out due to possible terminal/OS key conflicts
#bind-key -n S-F10 send-keys "\e[34~"


########################################
# Pane Border (inner only)
########################################

# Inactive pane border: theme-friendly dim color
set -g pane-border-style fg=colour8

# Active pane border: theme-adaptive blue + bold
set -g pane-active-border-style fg=blue,bold

# Show active-pane indicators on borders (no extra row required)
# Helps identify current pane clearly in simple left/right splits.
set -g pane-border-indicators both

# Pane border: show custom title if set, otherwise current directory
# New panes start with empty title so directory is shown by default
# Use `tmux select-pane -T "memo"` to override, `select-pane -T ""` to restore
set -g pane-border-status top
set -g pane-border-format ' #{?#T,#T,#{=/-30:#{s|#{HOME}|~|:pane_current_path}}} '
set-hook -g after-new-session 'select-pane -T ""'
set-hook -g after-new-window 'select-pane -T ""'
set-hook -g after-split-window 'select-pane -T ""'


########################################
# Reload (inner-specific path)
########################################

# prefix + r: Reload inner config only (common.conf is also re-sourced)
bind r 'source-file ~/.config/tmux/tmux.conf; display "Reloaded tmux.conf"'


########################################
# STATUS BAR (inner: black background)
# @B1, @B2, window-status-format, status-right are defined in common.conf
########################################

# Status bar background: black (distinct from base's grey)
set -g status-bg black; set -g status-fg white

# Left side: [WING ▸ host:session] [mouse status] [SYNC warning]
# WING = inner layer tag, #h = short hostname
# Shows red SYNC indicator when synchronize-panes is on
set -g status-left-length 80
set -g status-left '#{@B1}#[fg=yellow bold]WING #[fg=default nobold]▸ #[fg=blue]#h:#[fg=cyan]#S#{@B2}[M:#{?mouse,#[fg=green bold]On #[fg=default nobold],Off}]#{?synchronize-panes,#[fg=red bold] SYNC#[default],} '


########################################
# Plugins (inner only)
########################################

# tmux-sensible: Sensible default settings
# Note: sensible won't overwrite already-set values (if-shell based)

# tmux-tilish: i3wm-style window/pane management
# Alt+Number for workspace switching, Alt+Enter for new panes, etc.
set -g @tilish-default 'even-horizontal'

run 'bash ~/.config/tmux/tmux-plug.sh source-all'
